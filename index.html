<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CRM Статистика</title>
</head>
<body>

<!-- Экран ввода токена -->
<div id="setup-screen">
  <h2>Настройка подключения</h2>
  <p>Вставьте ссылку вашего вебхука из Битрикс24</p>
  <input 
    type="text" 
    id="webhook-input" 
    placeholder="https://crm.example.com/rest/22/токен/"
    style="width:500px"
  >
  <br><br>
  <button onclick="saveWebhook()">Сохранить и подключиться</button>
  <div id="setup-error"></div>
</div>

<!-- Основное приложение (скрыто до подключения) -->
<div id="app" style="display:none">
  <h1>CRM Статистика</h1>
  <button onclick="logout()">Сменить вебхук</button>
  <hr>
  <div id="content">Загрузка...</div>
</div>

<script>
let WEBHOOK = '';

// При загрузке проверяем — есть ли сохранённый токен
window.onload = function() {
  const saved = localStorage.getItem('bx_webhook');
  if (saved) {
    WEBHOOK = saved;
    showApp();
    loadData();
  }
}

function saveWebhook() {
  const val = document.getElementById('webhook-input').value.trim();
  if (!val.startsWith('http')) {
    document.getElementById('setup-error').innerText = 'Неверный формат ссылки';
    return;
  }
  WEBHOOK = val.endsWith('/') ? val : val + '/';
  localStorage.setItem('bx_webhook', WEBHOOK);
  showApp();
  loadData();
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function logout() {
  localStorage.removeItem('bx_webhook');
  location.reload();
}

async function loadData() {
  document.getElementById('content').innerHTML = 'Загрузка...';
  try {
    const res  = await fetch(WEBHOOK + 'crm.contact.list.json');
    const data = await res.json();
    if (data.result) {
      document.getElementById('content').innerHTML = 
        '✅ Подключение успешно! Контактов найдено: ' + data.total;
    } else {
      document.getElementById('content').innerHTML = 
        '❌ Ошибка API: ' + JSON.stringify(data.error_description);
    }
  } catch(e) {
    document.getElementById('content').innerHTML = 
      '❌ Ошибка подключения. Проверьте вебхук.';
  }
}
</script>

</body>
</html>
