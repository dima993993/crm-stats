<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Статистика</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }

  .header {
    background: #2563eb; color: white;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 1.3rem; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .btn-white { background: white; color: #2563eb; }
  .btn-blue  { background: #2563eb; color: white; }
  .btn-blue:hover { background: #1d4ed8; }

  .setup { max-width: 500px; margin: 80px auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .setup h2 { margin-bottom: 8px; }
  .setup p  { color: #666; margin-bottom: 20px; font-size: 0.9rem; }
  .setup input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; }
  .setup input:focus { outline: none; border-color: #2563eb; }
  .error { color: #dc2626; font-size: 0.85rem; margin-top: 8px; }

  .stats-bar { display: flex; gap: 16px; padding: 16px 24px; background: white; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
  .stat-card { background: #f0f7ff; border-radius: 8px; padding: 12px 20px; min-width: 160px; }
  .stat-card .label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
  .stat-card .value { font-size: 1.4rem; font-weight: 700; color: #2563eb; margin-top: 2px; }

  .filters { padding: 14px 24px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filters input, .filters select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.88rem; }
  .filters input:focus, .filters select:focus { outline: none; border-color: #2563eb; }
  .filters label { font-size: 0.85rem; color: #555; }

  .table-wrap { padding: 20px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  thead th { background: #2563eb; color: white; padding: 12px 16px; text-align: left; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
  tbody tr:hover { background: #f0f7ff; }
  tbody td { padding: 11px 16px; font-size: 0.9rem; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
  .badge-blue  { background: #dbeafe; color: #1d4ed8; }
  .sum { font-weight: 700; color: #059669; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; flex-wrap: wrap; }
  .page-btn { min-width: 34px; height: 34px; padding: 0 8px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.85rem; }
  .page-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
  .page-btn:hover:not(.active) { border-color: #2563eb; color: #2563eb; }

  .progress-bar { height: 3px; background: #dbeafe; }
  .progress-fill { height: 100%; background: #2563eb; transition: width 0.3s; width: 0%; }

  .loading-inline { text-align:center; padding: 40px; color: #888; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page-info { color: #888; font-size: 0.85rem; }
</style>
</head>
<body>

<!-- Экран настройки -->
<div id="setup-screen">
  <div class="setup">
    <h2>🔗 Подключение к Битрикс24</h2>
    <p>Вставьте ссылку вашего входящего вебхука</p>
    <input type="text" id="webhook-input" placeholder="https://crm.example.com/rest/22/токен/">
    <button class="btn btn-blue" style="width:100%" onclick="saveWebhook()">Подключиться</button>
    <div class="error" id="setup-error"></div>
  </div>
</div>

<!-- Приложение -->
<div id="app" style="display:none">
  <div class="header">
    <h1>📊 CRM Статистика — Клиенты</h1>
    <button class="btn btn-white" onclick="logout()">Сменить вебхук</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">Клиентов со сделками</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Всего сделок</div>
      <div class="value" id="stat-deals">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Общая сумма</div>
      <div class="value" id="stat-sum">—</div>
    </div>
    <div class="stat-card" id="stat-loading-card" style="background:#fff8e1">
      <div class="label">Статус</div>
      <div class="value" id="stat-status" style="font-size:0.95rem;color:#b45309">⏳ Загрузка…</div>
    </div>
  </div>

  <div class="filters">
    <label>Поиск:</label>
    <input type="search" id="search" placeholder="Имя, email, телефон…" oninput="onSearch()">
    <label>Дата с:</label>
    <input type="date" id="date-from" onchange="renderPage(1)">
    <label>по:</label>
    <input type="date" id="date-to" onchange="renderPage(1)">
    <label>Сортировка:</label>
    <select id="sort-select" onchange="renderPage(1)">
      <option value="sum-desc">Сумма ↓</option>
      <option value="sum-asc">Сумма ↑</option>
      <option value="deals-desc">Сделок ↓</option>
      <option value="name-asc">Имя А→Я</option>
      <option value="date-desc">Дата ↓</option>
    </select>
    <button class="btn btn-blue" onclick="startLoad()">🔄 Обновить</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Имя</th><th>Телефон</th>
          <th>Email</th><th>Дата создания</th>
          <th>Сделок</th><th>Сумма (₴)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7"><div class="loading-inline">
          <div class="spinner"></div>Подготовка…
        </div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
let WEBHOOK = '';
let allData = [];        // накапливается по мере загрузки
let loading = false;
let searchTimer = null;
const PAGE_SIZE = 50;    // строк на странице
const BATCH = 50;        // контактов за один запрос (лимит Битрикс)

// ── Init ──────────────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('bx_webhook');
  if (saved) { WEBHOOK = saved; showApp(); startLoad(); }
};

function saveWebhook() {
  const val = document.getElementById('webhook-input').value.trim();
  if (!val.startsWith('http')) {
    document.getElementById('setup-error').innerText = 'Неверный формат ссылки';
    return;
  }
  WEBHOOK = val.endsWith('/') ? val : val + '/';
  localStorage.setItem('bx_webhook', WEBHOOK);
  showApp();
  startLoad();
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function logout() {
  localStorage.removeItem('bx_webhook');
  location.reload();
}

// ── Fetch helpers ─────────────────────────────────────────────────
async function bxGet(method, params = {}) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(`${WEBHOOK}${method}.json?${qs}`);
  return await res.json();
}

// ── Main loader: порционная загрузка ─────────────────────────────
async function startLoad() {
